---
title: "ZFIN zf_info — Full Table of Contents"
---
<style>
    .fulltoc { max-width: 60rem; }
    .fulltoc h1 { margin-bottom: .25rem; }
    .fulltoc .intro { color: #555; margin: 0 0 1rem; }
    .fulltoc details { margin: .2rem 0; }
    .fulltoc #toc-root > details > summary {
        font-size: 1.1rem; font-weight: 600; cursor: pointer; padding: .35rem 0;
    }
    .fulltoc .toc-section { margin: .3rem 0 .7rem 1.1rem; }
    .fulltoc .toc-section-title { font-weight: 600; color: #333; margin: .5rem 0 .2rem; }
    .fulltoc ul { list-style: none; margin: 0 0 0 1.1rem; padding: 0; }
    .fulltoc li { margin: .12rem 0; }
    .fulltoc a { text-decoration: none; }
    .fulltoc a:hover { text-decoration: underline; }
    .fulltoc .count { color: #888; font-weight: 400; font-size: .85em; }
    .fulltoc .err { color: #a00; }
    .fulltoc .toolbar { margin: .5rem 0 1rem; }
    .fulltoc .toolbar button { margin-right: .5rem; }
    .fulltoc .booknav-pref { margin: 0 0 1rem; }
    .fulltoc .booknav-pref-note { color: #888; margin-left: .5rem; font-size: .9em; }
</style>

<div class="fulltoc">
    <h1>The Zebrafish Information Network &mdash; zf_info contents</h1>
    <p class="intro">
        A generated index of the archival <code>zf_info</code> reference pages,
        built at page load from the per-collection TOC JSON under
        <code>/zf_info/toc/</code>.
    </p>
    <div class="toolbar">
        <button type="button" id="toc-expand">Expand all</button>
        <button type="button" id="toc-collapse">Collapse all</button>
    </div>
    <p class="booknav-pref">
        <label>
            <input type="checkbox" id="booknav-toggle">
            Show a prev/next navigation bar at the bottom of reference pages
        </label>
        <span class="booknav-pref-note" id="booknav-pref-note"></span>
    </p>
    <p class="booknav-pref">
        <label>
            <input type="checkbox" id="booknav-fulltoc-toggle">
            Also add a link back to this full table of contents
        </label>
        <span class="booknav-pref-note" id="booknav-fulltoc-pref-note"></span>
    </p>
    <div id="toc-root">Loading&hellip;</div>
</div>

<script>
(function () {
    // Collections come from the manifest (list-of-tocs.json) so this page and
    // booknav.js share one source of truth for what exists and in what order.
    var root = document.getElementById('toc-root');

    // Titles come from the pages' <title> text and may carry HTML entities
    // (e.g. "&gt;"); decode them for display.
    var decoder = document.createElement('textarea');
    function decode(s) { decoder.innerHTML = s || ''; return decoder.value; }

    // Opt-in toggles for the per-page nav (booknav.js), each saved in
    // localStorage. Off by default.
    function setupToggle(boxId, key, noteId, onText, offText) {
        var box = document.getElementById(boxId);
        var note = document.getElementById(noteId);
        function paint() { note.textContent = box.checked ? onText : offText; }
        try { box.checked = localStorage.getItem(key) === 'on'; } catch (e) {}
        paint();
        box.addEventListener('change', function () {
            try {
                if (box.checked) localStorage.setItem(key, 'on');
                else localStorage.removeItem(key);
            } catch (e) {}
            paint();
        });
    }
    setupToggle('booknav-toggle', 'zfin-booknav', 'booknav-pref-note',
        'On — a Prev / Contents / Next bar appears on pages that are part of a sequence.',
        'Off.');
    setupToggle('booknav-fulltoc-toggle', 'zfin-booknav-fulltoc', 'booknav-fulltoc-pref-note',
        'On — the bar also links back to this page (needs the bar above to be on).',
        'Off.');

    function renderCollection(label, data) {
        var details = document.createElement('details');
        var summary = document.createElement('summary');
        var count = (data.spine && data.spine.length) || 0;
        summary.appendChild(document.createTextNode(label + ' '));
        var badge = document.createElement('span');
        badge.className = 'count';
        badge.textContent = '(' + count + ')';
        summary.appendChild(badge);
        details.appendChild(summary);

        (data.sections || []).forEach(function (sec) {
            var box = document.createElement('div');
            box.className = 'toc-section';
            if (sec.title) {
                var h = document.createElement('div');
                h.className = 'toc-section-title';
                h.textContent = decode(sec.title);
                box.appendChild(h);
            }
            var ul = document.createElement('ul');
            (sec.pages || []).forEach(function (p) {
                var li = document.createElement('li');
                var a = document.createElement('a');
                a.href = p.href;
                a.textContent = decode(p.title) || p.href;
                li.appendChild(a);
                ul.appendChild(li);
            });
            box.appendChild(ul);
            details.appendChild(box);
        });
        return details;
    }

    fetch('list-of-tocs.json')
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (manifest) {
            var cols = (manifest && manifest.collections) || [];
            return Promise.all(cols.map(function (c) {
                return fetch(c.json)
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (j) { return { c: c, data: j }; })
                    .catch(function () { return { c: c, data: null }; });
            }));
        })
        .then(function (results) {
            root.innerHTML = '';
            results.forEach(function (res) {
                if (!res.data) {
                    var e = document.createElement('div');
                    e.className = 'err';
                    e.textContent = res.c.label + ': could not load ' + res.c.json;
                    root.appendChild(e);
                    return;
                }
                root.appendChild(renderCollection(res.c.label, res.data));
            });
        })
        .catch(function () { root.textContent = 'Could not load the TOC manifest.'; });

    function setAll(open) {
        [].forEach.call(root.querySelectorAll('details'), function (d) { d.open = open; });
    }
    document.getElementById('toc-expand').addEventListener('click', function () { setAll(true); });
    document.getElementById('toc-collapse').addEventListener('click', function () { setAll(false); });
})();
</script>
